name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            APP_DIR="/opt/redditprofile"

            # Install Node.js if not present
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
              apt-get install -y nodejs
            fi

            # First-time clone
            if [ ! -d "$APP_DIR" ]; then
              git clone https://github.com/Asad-noob69/redditprofile.git "$APP_DIR"
              cd "$APP_DIR"
            else
              cd "$APP_DIR"
              git pull origin main
            fi

            # Create .env if it doesn't exist
            if [ ! -f .env ]; then
              cat > .env << EOF
            DATABASE_URL="file:./dev.db"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            GOOGLE_CSE_API_KEY="${{ secrets.GOOGLE_CSE_API_KEY }}"
            GOOGLE_CSE_ID="${{ secrets.GOOGLE_CSE_ID }}"
            NODE_ENV=production
            EOF
            fi

            npm install
            npx prisma generate
            npx prisma migrate deploy
            npm run build

            # Seed admin user if first deploy
            if [ ! -f .seeded ]; then
              npx tsx prisma/seed.ts && touch .seeded
            fi

            # Restart with PM2
            if command -v pm2 &> /dev/null; then
              pm2 restart redditprofile 2>/dev/null || pm2 start npm --name "redditprofile" -- start -- -p 3000
              pm2 save
            else
              npm install -g pm2
              pm2 start npm --name "redditprofile" -- start -- -p 3000
              pm2 startup
              pm2 save
            fi
